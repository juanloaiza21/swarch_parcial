<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNMarket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="container nav-inner">
      <a class="brand" href="#/">
        <span class="brand-mark">◆</span>
        <span class="brand-text">UN<span class="brand-accent">Market</span></span>
      </a>
      <nav class="nav-links">
        <a href="#/" class="nav-link">Storefront</a>
        <a href="#/products/new" class="nav-link nav-cta">+ New product</a>
        <a href="#/cart" class="nav-link cart-link">
          <span class="cart-icon">🛒</span>
          <span class="cart-badge" id="cart-badge" hidden>0</span>
        </a>
        <div class="user-chip" id="user-chip" title="">
          <span class="avatar" id="user-avatar">··</span>
          <span class="user-meta">
            <span class="user-name" id="user-name">Loading…</span>
            <span class="user-id" id="user-id"></span>
          </span>
        </div>
      </nav>
    </div>
  </header>

  <div id="flash-host" class="container"></div>

  <main id="app" class="container"></main>

  <footer class="footer">
    <div class="container footer-inner">
      <span>UNMarket — frontend + backend, two images.</span>
      <span class="muted" id="footer-user"></span>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
