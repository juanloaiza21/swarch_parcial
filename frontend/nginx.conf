server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Serve static assets; fall back to index.html for the SPA's hash routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse-proxy API calls to the backend container.
  # "un_store_back" resolves via docker-compose's service network.
  location /api/ {
    proxy_pass http://un_store_back:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /healthz {
    add_header Content-Type application/json;
    return 200 '{"status":"ok"}';
  }
}
