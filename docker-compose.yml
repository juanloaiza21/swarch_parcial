# Architecture (per diagram):
#   Web Browser --HTTP--> un_store_front --HTTP/REST--> un_store_back
#       un_store_back --DB Connector--> un_store_db (SQLite volume)
#       un_store_back --HTTP/REST--> payment broker /queue (pasarela-grupo-3)
services:
  un_store_back:
    build: ./backend
    image: un_store_back
    container_name: un_store_back
    environment:
      PORT: 3000
      DB_PATH: /data/marketplace.db
      # Point this at the payment broker's /queue endpoint, e.g.
      # http://<broker-ip>:8001/queue. When empty, payments are simulated so
      # the end-to-end flow still works.
      BROKER_URL: ${BROKER_URL:-}
    volumes:
      - un_store_db:/data
    expose:
      - "3000"
    ports:
      - "3000:3000" # exposed for direct API access / debugging
    restart: unless-stopped

  un_store_front:
    build: ./frontend
    image: un_store_front
    container_name: un_store_front
    depends_on:
      - un_store_back
    ports:
      - "8080:80"
    restart: unless-stopped

# un_store_db: the single SQLite database file, persisted on a named volume.
volumes:
  un_store_db:
